version: '3.8'

services:
  web:
    image: grocery-marketplace-web
    build:
      context: ./web
    ports:
      - '8000:80'
    depends_on:
      - db
      - messaging_service

  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: grocery_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

  messaging_service:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

volumes:
  db_data: